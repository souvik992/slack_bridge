name: Playwright Tests (Slack-triggered)

on:
  # Triggered by the middleware API via GitHub's repository_dispatch API
  repository_dispatch:
    types: [playwright-test]

  # Allow manual runs from the Actions UI
  workflow_dispatch:
    inputs:
      test_suite:
        description: "Test suite to run (e.g. 'login', 'checkout', 'all')"
        required: false
        default: "all"
      browser:
        description: "Browser: chromium | firefox | webkit"
        required: false
        default: "chromium"
      slack_channel:
        description: "Slack channel ID to post results to"
        required: false
        default: ""
      triggered_by:
        description: "Slack user ID who triggered the run"
        required: false
        default: ""

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Resolve inputs whether coming from repository_dispatch or workflow_dispatch
      TEST_SUITE: ${{ github.event.client_payload.test_suite || inputs.test_suite || 'all' }}
      BROWSER: ${{ github.event.client_payload.browser || inputs.browser || 'chromium' }}
      SLACK_CHANNEL: ${{ github.event.client_payload.slack_channel || inputs.slack_channel || '' }}
      TRIGGERED_BY: ${{ github.event.client_payload.triggered_by || inputs.triggered_by || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ env.BROWSER }}

      - name: Run Playwright tests
        id: run_tests
        run: |
          START_TIME=$(date +%s)

          # Build the test filter flag
          if [ "$TEST_SUITE" = "all" ]; then
            TEST_FILTER=""
          else
            TEST_FILTER="--grep $TEST_SUITE"
          fi

          # Run Playwright; capture exit code without failing the step immediately
          set +e
          npx playwright test \
            --project=${{ env.BROWSER }} \
            $TEST_FILTER \
            --reporter=json \
            2>&1 | tee playwright-output.json
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          END_TIME=$(date +%s)
          DURATION_SECS=$((END_TIME - START_TIME))
          MINUTES=$((DURATION_SECS / 60))
          SECONDS=$((DURATION_SECS % 60))
          DURATION="${MINUTES}m ${SECONDS}s"

          # Parse pass/fail counts from the JSON report
          PASSED=$(jq '.stats.expected // 0' playwright-output.json 2>/dev/null || echo 0)
          FAILED=$(jq '.stats.unexpected // 0' playwright-output.json 2>/dev/null || echo 0)
          TOTAL=$(jq '.stats.total // 0'    playwright-output.json 2>/dev/null || echo 0)

          echo "passed=$PASSED"     >> $GITHUB_OUTPUT
          echo "failed=$FAILED"     >> $GITHUB_OUTPUT
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Post results to Slack
        if: always() && env.SLACK_CHANNEL != ''
        env:
          RESULTS_WEBHOOK_SECRET: ${{ secrets.RESULTS_WEBHOOK_SECRET }}
          MIDDLEWARE_URL: ${{ secrets.MIDDLEWARE_URL }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "$MIDDLEWARE_URL/slack/results" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RESULTS_WEBHOOK_SECRET" \
            -d '{
              "slack_channel":  "'"$SLACK_CHANNEL"'",
              "triggered_by":   "'"$TRIGGERED_BY"'",
              "passed":         ${{ steps.run_tests.outputs.passed }},
              "failed":         ${{ steps.run_tests.outputs.failed }},
              "total":          ${{ steps.run_tests.outputs.total }},
              "duration":       "'"${{ steps.run_tests.outputs.duration }}"'",
              "run_url":        "'"$RUN_URL"'"
            }'

      - name: Fail job if tests failed
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1
